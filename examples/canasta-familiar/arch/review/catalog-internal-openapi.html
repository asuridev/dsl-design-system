      (function () {
        const state = window.DSL_I18N || { locale: 'es', catalogs: {} };
        const stored = localStorage.getItem('dsl-preview-locale');
        let current = state.catalogs[stored] ? stored : state.locale;
        function translate() {
          const catalog = state.catalogs[current] || state.catalogs.es || state.catalogs.en || {};
          document.documentElement.lang = current;
          document.querySelectorAll('[data-i18n]').forEach((el) => {
            const key = el.getAttribute('data-i18n');
            if (catalog[key]) el.textContent = catalog[key];
          });
          document.querySelectorAll('[data-i18n-title]').forEach((el) => {
            const key = el.getAttribute('data-i18n-title');
            if (catalog[key]) el.setAttribute('title', catalog[key]);
          });
          document.querySelectorAll('[data-locale]').forEach((btn) => {
            btn.classList.toggle('active', btn.getAttribute('data-locale') === current);
            btn.setAttribute('aria-pressed', btn.getAttribute('data-locale') === current ? 'true' : 'false');
          });
        }
        window.dslSetLocale = function (locale) {
          if (!state.catalogs[locale]) return;
          current = locale;
          localStorage.setItem('dsl-preview-locale', locale);
          translate();
        };
        window.dslT = function (key) {
          const catalog = state.catalogs[current] || state.catalogs.es || state.catalogs.en || {};
          return catalog[key] || key;
        };
        window.addEventListener('DOMContentLoaded', translate);
      })();

    <script>
      (function () {
        var KEY = 'dsl-preview-theme';
        function resolve() {
          var s = localStorage.getItem(KEY);
          if (s === 'dark' || s === 'light') return s;
          return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        var current = window.__dslPreviewTheme || resolve();
        function syncButtons() {
          document.querySelectorAll('[data-theme-toggle]').forEach(function (btn) {
            btn.setAttribute('aria-pressed', current === 'dark' ? 'true' : 'false');
            var icon = btn.querySelector('[data-theme-icon]');
            if (icon) icon.textContent = current === 'dark' ? '☀️' : '🌙';
          });
        }
        function applyTheme(theme) {
          current = theme;
          window.__dslPreviewTheme = theme;
          document.documentElement.setAttribute('data-bs-theme', theme);
          syncButtons();
        }
        window.dslToggleTheme = function () {
          var next = current === 'dark' ? 'light' : 'dark';
          localStorage.setItem(KEY, next);
          applyTheme(next);
          if (typeof mermaid !== 'undefined' && document.querySelector('.mermaid')) {
            location.reload();
          }
        };
        syncButtons();
        window.addEventListener('DOMContentLoaded', syncButtons);
      })();
    </script>

  ],
  "paths": {

      "post": {
        "operationId": "validateProductsAndPrices",
        "summary": "Obtener snapshot de precios y disponibilidad",
        "description": "Retorna el precio actual y el estado de cada producto en la lista proporcionada. Usado por el BC orders para crear la snapshot monetaria (OrderLine.unitPrice) durante el checkout, previniendo manipulación de precios (OWASP A04).\nLa respuesta puede contener menos elementos que la lista de entrada si algún productId no existe. El BC orders es responsable de detectar IDs faltantes y rechazar el checkout.\n",

            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "productIds"

                  "productIds": {
                    "type": "array",
                    "items": {
                      "type": "string",

        },

                    "type": "object",
                    "required": [

                      "price",
                      "status"

                    "properties": {
                      "productId": {
                        "type": "string",
                        "format": "uuid",

                            "maxLength": 3,

                            "example": "COP"

                        }
                      },
                      "status": {
                        "type": "string",
                        "enum": [
                          "DRAFT",
                          "ACTIVE",
                          "DISCONTINUED"
                        ]
                      }
                    }
                  }
                },
                "example": [
                  {
                    "productId": "3fa85f64-5717-4562-b3fc-2c963f66afa6",
                    "name": "Leche Entera 1L",
                    "price": {
                      "amount": "3500.0000",
                      "currency": "COP"
                    },
                    "status": "ACTIVE"
                  }
                ]
              }
            }
          },
          "400": {
            "description": "La solicitud contiene parámetros inválidos o mal formados",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "required": [
                    "code"
                  ],
                  "properties": {
                    "code": {
                      "type": "string"
                    },
                    "message": {
                      "type": "string"
                    }
                  }
                }
              }
            }
          },
          "401": {
            "description": "Token de autenticación ausente o inválido",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "required": [
                    "code"
                  ],
                  "properties": {
                    "code": {
                      "type": "string"
                    },
                    "message": {
                      "type": "string"
                    }
                  }
                }
              }
            }
          },
          "403": {
            "description": "El caller no tiene permiso para invocar este endpoint interno",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "required": [
                    "code"
                  ],
                  "properties": {
                    "code": {
                      "type": "string"
                    },
                    "message": {
                      "type": "string"
                    }
                  }
                }
              }
            }
          },
          "422": {
            "description": "La lista de productIds es inválida (vacía o supera el máximo)",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "required": [
                    "code"
                  ],
                  "properties": {
                    "code": {
                      "type": "string"
                    },
                    "message": {
                      "type": "string"
                    }
                  }
                },
                "example": {
                  "code": "VALIDATION_ERROR",
                  "message": "productIds must have between 1 and 100 elements"
                }
              }
            }
          }
        }
      }
    }
  },
  "components": {
    "securitySchemes": {
      "bearerAuth": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "JWT",
        "description": "JWT propagado por el BC caller con los claims del usuario que inició la operación (e.g. el cliente que está haciendo checkout).\n"
      }
    },
    "responses": {
      "BadRequest": {
        "description": "La solicitud contiene parámetros inválidos o mal formados",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/ErrorResponse"
            }
          }
        }
      },
      "Unauthorized": {
        "description": "Token de autenticación ausente o inválido",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/ErrorResponse"
            }
          }
        }
      },
      "Forbidden": {
        "description": "El caller no tiene permiso para invocar este endpoint interno",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/ErrorResponse"
            }
          }
        }
      },
      "UnprocessableEntity": {
        "description": "La lista de productIds es inválida (vacía o supera el máximo)",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/ErrorResponse"
            },
            "example": {
              "code": "VALIDATION_ERROR",
              "message": "productIds must have between 1 and 100 elements"
            }
          }
        }
      }
    },
    "schemas": {
      "PriceSnapshotRequest": {
        "type": "object",
        "required": [
          "productIds"
        ],
        "properties": {
          "productIds": {
            "type": "array",
            "items": {
              "type": "string",
              "format": "uuid"
            },
            "minItems": 1,
            "maxItems": 100,
            "description": "Lista de IDs de productos para los cuales se requiere snapshot de precio"
          }
        }
      },
      "ProductPriceSnapshot": {
        "type": "object",
        "required": [
          "productId",
          "name",
          "price",
          "status"
        ],
        "description": "Snapshot autoritativo del precio y estado de un producto al momento del checkout. Usado por orders para congelar el precio en OrderLine.unitPrice.\n",
        "properties": {
          "productId": {
            "type": "string",
            "format": "uuid",
            "description": "ID del producto"
          },
          "name": {
            "type": "string",
            "description": "Nombre comercial del producto al momento del snapshot"
          },
          "price": {
            "$ref": "#/components/schemas/Money"
          },
          "status": {
            "$ref": "#/components/schemas/ProductStatus",
            "description": "Estado actual del producto. orders debe rechazar el checkout si status != ACTIVE.\n"
          }
        }
      },
      "Money": {
        "type": "object",
        "required": [
          "amount",
          "currency"
        ],
        "properties": {
          "amount": {
            "type": "string",
            "description": "Monto exacto como string decimal con 4 decimales. Nunca número flotante.",
            "example": "3500.0000",
            "pattern": "^[0-9]+\\.[0-9]{1,4}$"
          },
          "currency": {
            "type": "string",
            "minLength": 3,
            "maxLength": 3,
            "pattern": "^[A-Z]{3}$",
            "example": "COP"
          }
        }
      },
      "ProductStatus": {
        "type": "string",
        "enum": [
          "DRAFT",
          "ACTIVE",
          "DISCONTINUED"
        ]
      },
      "ErrorResponse": {
        "type": "object",
        "required": [
          "code"
        ],
        "properties": {
          "code": {
            "type": "string"
          },
          "message": {
            "type": "string"
          }
        }
      }
    }
  }
},
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
      layout: 'BaseLayout',
      deepLinking: true,
      tryItOutEnabled: false,
      validatorUrl: null,
    });
  </script>
</body>
</html>
