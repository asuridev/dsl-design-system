asyncapi: "2.6.0"

info:
  title: Orders Async API
  description: |
    Asynchronous messaging contracts for the `orders` Bounded Context of Canasta Familiar.
    
    **Published channels:** Events emitted by the orders BC to the message broker.
    **Consumed channels:** Events consumed by the orders BC from other BCs.
    
    All events are persisted via the Outbox pattern (outboxRetentionDays: 7).
    Consumer idempotency is enforced via a processed-events store (TTL: 14 days).
  version: "1.0.0"

defaultContentType: application/json

channels:

  # ─── PUBLISHED ────────────────────────────────────────────────────────────

  orders.order.placed:
    description: |
      Emitted when a new order is created at checkout.
      **Triggers CheckoutSaga step 1:** inventory reserves stock.
    publish:
      operationId: publishOrderPlaced
      summary: Order placed by customer at checkout
      message:
        $ref: '#/components/messages/OrderPlaced'

  orders.order.confirmed:
    description: |
      Emitted when an order transitions to CONFIRMED after successful payment.
      **Triggers CheckoutSaga step 4:** delivery creates a DeliveryOrder.
      Also consumed by notifications BC.
    publish:
      operationId: publishOrderConfirmed
      summary: Order confirmed after payment approval
      message:
        $ref: '#/components/messages/OrderConfirmed'

  orders.order.cancelled:
    description: |
      Emitted when an order is cancelled for any reason:
      customer request, stock reservation failure, or payment failure.
      Consumed by delivery (cancel delivery), payments (refund if CARD),
      and notifications BC.
    publish:
      operationId: publishOrderCancelled
      summary: Order cancelled
      message:
        $ref: '#/components/messages/OrderCancelled'

  # ─── CONSUMED ─────────────────────────────────────────────────────────────

  payments.payment.approved:
    description: |
      Consumed by orders BC to confirm the order (UC-ORD-020 ConfirmOrder).
      Step 3 of the CheckoutSaga — payment was successfully authorized.
    subscribe:
      operationId: consumePaymentApproved
      summary: Payment was approved — confirm the order
      message:
        $ref: '#/components/messages/PaymentApproved'

  payments.payment.failed:
    description: |
      Consumed by orders BC to cancel the order (UC-ORD-022 CancelOrderOnPaymentFailed).
      CheckoutSaga compensation path — payment processor rejected the charge.
    subscribe:
      operationId: consumePaymentFailed
      summary: Payment failed — cancel the order
      message:
        $ref: '#/components/messages/PaymentFailed'

  payments.payment.refunded:
    description: |
      Consumed by orders BC for saga audit acknowledgment (UC-ORD-026).
      Confirms a card refund was processed for a cancelled confirmed order.
    subscribe:
      operationId: consumePaymentRefunded
      summary: Payment refunded — acknowledge for saga tracking
      message:
        $ref: '#/components/messages/PaymentRefunded'

  inventory.stock.reservation.failed:
    description: |
      Consumed by orders BC to cancel the order (UC-ORD-021 CancelOrderOnStockFailed).
      CheckoutSaga compensation path — insufficient stock for one or more products.
    subscribe:
      operationId: consumeStockReservationFailed
      summary: Stock reservation failed — cancel the order
      message:
        $ref: '#/components/messages/StockReservationFailed'

  inventory.stock.released:
    description: |
      Consumed by orders BC for saga audit acknowledgment (UC-ORD-025).
      Confirms inventory has released reserved stock as compensation after payment failure.
    subscribe:
      operationId: consumeStockReleased
      summary: Stock released — acknowledge for saga tracking
      message:
        $ref: '#/components/messages/StockReleased'

  delivery.delivery.order.created:
    description: |
      Consumed by orders BC to set the order IN_DELIVERY (UC-ORD-023).
      Confirms a courier has been assigned and is picking up the order.
    subscribe:
      operationId: consumeDeliveryOrderCreated
      summary: Delivery order created — set order in delivery
      message:
        $ref: '#/components/messages/DeliveryOrderCreated'

  delivery.delivery.completed:
    description: |
      Consumed by orders BC to complete the order (UC-ORD-024 CompleteDelivery).
      Confirms the package was handed to the customer.
    subscribe:
      operationId: consumeDeliveryCompleted
      summary: Delivery completed — mark order as delivered
      message:
        $ref: '#/components/messages/DeliveryCompleted'

  customers.customer.address.updated:
    description: |
      Consumed by orders BC to sync the CustomerAddress local read model (UC-ORD-030).
      A customer has added, updated, or deleted a delivery address.
    subscribe:
      operationId: consumeCustomerAddressUpdated
      summary: Customer address updated — sync local read model
      message:
        $ref: '#/components/messages/CustomerAddressUpdated'


components:

  messages:

    # ── Published Messages ───────────────────────────────────────────────────

    OrderPlaced:
      name: OrderPlaced
      title: Order Placed
      contentType: application/json
      summary: A new order has been placed. Triggers stock reservation.
      headers:
        type: object
        properties:
          eventId:
            type: string
            format: uuid
            description: Unique event identifier for idempotency.
          eventType:
            type: string
            const: OrderPlaced
          occurredAt:
            type: string
            format: date-time
          bcSource:
            type: string
            const: orders
      payload:
        $ref: '#/components/schemas/OrderPlacedPayload'

    OrderConfirmed:
      name: OrderConfirmed
      title: Order Confirmed
      contentType: application/json
      summary: An order has been confirmed after payment approval.
      headers:
        type: object
        properties:
          eventId:
            type: string
            format: uuid
          eventType:
            type: string
            const: OrderConfirmed
          occurredAt:
            type: string
            format: date-time
          bcSource:
            type: string
            const: orders
      payload:
        $ref: '#/components/schemas/OrderConfirmedPayload'

    OrderCancelled:
      name: OrderCancelled
      title: Order Cancelled
      contentType: application/json
      summary: An order has been cancelled.
      headers:
        type: object
        properties:
          eventId:
            type: string
            format: uuid
          eventType:
            type: string
            const: OrderCancelled
          occurredAt:
            type: string
            format: date-time
          bcSource:
            type: string
            const: orders
      payload:
        $ref: '#/components/schemas/OrderCancelledPayload'

    # ── Consumed Messages ────────────────────────────────────────────────────

    PaymentApproved:
      name: PaymentApproved
      title: Payment Approved
      contentType: application/json
      summary: Payment was approved. Triggers order confirmation.
      payload:
        $ref: '#/components/schemas/PaymentApprovedPayload'

    PaymentFailed:
      name: PaymentFailed
      title: Payment Failed
      contentType: application/json
      summary: Payment failed. Triggers order cancellation.
      payload:
        $ref: '#/components/schemas/PaymentFailedPayload'

    PaymentRefunded:
      name: PaymentRefunded
      title: Payment Refunded
      contentType: application/json
      summary: Payment refund was processed.
      payload:
        $ref: '#/components/schemas/PaymentRefundedPayload'

    StockReservationFailed:
      name: StockReservationFailed
      title: Stock Reservation Failed
      contentType: application/json
      summary: Stock reservation failed. Triggers order cancellation.
      payload:
        $ref: '#/components/schemas/StockReservationFailedPayload'

    StockReleased:
      name: StockReleased
      title: Stock Released
      contentType: application/json
      summary: Reserved stock was released as compensation.
      payload:
        $ref: '#/components/schemas/StockReleasedPayload'

    DeliveryOrderCreated:
      name: DeliveryOrderCreated
      title: Delivery Order Created
      contentType: application/json
      summary: A delivery order was created and a courier assigned.
      payload:
        $ref: '#/components/schemas/DeliveryOrderCreatedPayload'

    DeliveryCompleted:
      name: DeliveryCompleted
      title: Delivery Completed
      contentType: application/json
      summary: The package was delivered to the customer.
      payload:
        $ref: '#/components/schemas/DeliveryCompletedPayload'

    CustomerAddressUpdated:
      name: CustomerAddressUpdated
      title: Customer Address Updated
      contentType: application/json
      summary: A customer's delivery address was created, updated, or deleted.
      payload:
        $ref: '#/components/schemas/CustomerAddressUpdatedPayload'

  schemas:

    # ── Shared ───────────────────────────────────────────────────────────────

    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: string
          description: "Exact decimal string (e.g. '15000.0000')"
          example: "15000.0000"
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
          example: "COP"

    DeliveryAddressSnapshot:
      type: object
      required: [street, city, postalCode]
      properties:
        street:
          type: string
          maxLength: 300
        city:
          type: string
          maxLength: 100
        postalCode:
          type: string
          maxLength: 20
        reference:
          type: string
          maxLength: 500
          nullable: true

    OrderLineSnapshot:
      type: object
      required: [productId, productName, unitPrice, quantity, subtotal]
      properties:
        productId:
          type: string
          format: uuid
        productName:
          type: string
          maxLength: 200
        unitPrice:
          $ref: '#/components/schemas/Money'
        quantity:
          type: integer
          minimum: 1
        subtotal:
          $ref: '#/components/schemas/Money'

    # ── Published Payloads ───────────────────────────────────────────────────

    OrderPlacedPayload:
      type: object
      required: [orderId, customerId, paymentMethod, total, deliveryAddressId, lines]
      properties:
        orderId:
          type: string
          format: uuid
          description: Unique identifier of the placed order.
        customerId:
          type: string
          format: uuid
          description: ID of the customer who placed the order.
        paymentMethod:
          type: string
          maxLength: 20
          enum: [CARD, CASH_ON_DELIVERY]
          description: Payment method selected at cart creation.
        total:
          $ref: '#/components/schemas/Money'
        deliveryAddressId:
          type: string
          format: uuid
          description: ID of the selected delivery address.
        lines:
          type: array
          minItems: 1
          description: Order lines with price snapshots for stock reservation.
          items:
            $ref: '#/components/schemas/OrderLineSnapshot'

    OrderConfirmedPayload:
      type: object
      required: [orderId, customerId, paymentMethod, total, deliveryAddressId, deliveryAddress]
      properties:
        orderId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        paymentMethod:
          type: string
          maxLength: 20
          enum: [CARD, CASH_ON_DELIVERY]
        total:
          $ref: '#/components/schemas/Money'
        deliveryAddressId:
          type: string
          format: uuid
        deliveryAddress:
          $ref: '#/components/schemas/DeliveryAddressSnapshot'

    OrderCancelledPayload:
      type: object
      required: [orderId, customerId, paymentMethod]
      properties:
        orderId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        paymentMethod:
          type: string
          maxLength: 20
          enum: [CARD, CASH_ON_DELIVERY]

    # ── Consumed Payloads ────────────────────────────────────────────────────

    PaymentApprovedPayload:
      type: object
      required: [orderId, paymentId]
      properties:
        orderId:
          type: string
          format: uuid
        paymentId:
          type: string
          format: uuid

    PaymentFailedPayload:
      type: object
      required: [orderId]
      properties:
        orderId:
          type: string
          format: uuid

    PaymentRefundedPayload:
      type: object
      required: [orderId, refundId]
      properties:
        orderId:
          type: string
          format: uuid
        refundId:
          type: string
          format: uuid

    StockReservationFailedPayload:
      type: object
      required: [orderId]
      properties:
        orderId:
          type: string
          format: uuid

    StockReleasedPayload:
      type: object
      required: [orderId, reservationId]
      properties:
        orderId:
          type: string
          format: uuid
        reservationId:
          type: string
          format: uuid

    DeliveryOrderCreatedPayload:
      type: object
      required: [orderId, deliveryOrderId]
      properties:
        orderId:
          type: string
          format: uuid
        deliveryOrderId:
          type: string
          format: uuid

    DeliveryCompletedPayload:
      type: object
      required: [orderId]
      properties:
        orderId:
          type: string
          format: uuid

    CustomerAddressUpdatedPayload:
      type: object
      required: [addressId, customerId, street, city, postalCode, deleted]
      properties:
        addressId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        street:
          type: string
          maxLength: 300
        city:
          type: string
          maxLength: 100
        postalCode:
          type: string
          maxLength: 20
        reference:
          type: string
          maxLength: 500
          nullable: true
        deleted:
          type: boolean
          description: true when the customer deleted this address.
